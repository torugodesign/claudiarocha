# Configuração do Nginx para o site Cláudia Rocha
# Instalar em: /etc/nginx/sites-available/claudia_rocha
# Depois ativar com:
#   sudo ln -s /etc/nginx/sites-available/claudia_rocha /etc/nginx/sites-enabled/
#   sudo nginx -t
#   sudo systemctl restart nginx

server {
    listen 80;
    server_name claudiarochaadv.com www.claudiarochaadv.com;

    client_max_body_size 100M;

    # Compressão — reduz CSS/JS/HTML em ~70-80% antes de sair pro navegador
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml
        font/ttf
        font/otf;

    location /static/ {
        alias /var/www/claudia_rocha/staticfiles/;
        # Arquivos estáticos usam ?v=... pra cache-busting, então podem ser
        # guardados pelo navegador por muito tempo sem risco de servir versão velha.
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    location /media/ {
        alias /var/www/claudia_rocha/media/;
        # Fotos e vídeos enviados pelo painel — cache mais curto, pois podem
        # ser trocados sem mudar de nome de arquivo.
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    location / {
        proxy_pass http://unix:/run/gunicorn_claudia.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
